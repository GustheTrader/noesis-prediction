###############################################################################
# SOVEREIGN OS — Full Production Stack
#
# Docker Compose for the complete Sovereign OS infrastructure.
# All open source. All self-hosted. All sovereign.
#
# Services:
#   - PostgreSQL (structured data)
#   - Redis (cache + pub/sub + streams)
#   - Redpanda (event streaming, Kafka-compatible)
#   - Qdrant (vector memory)
#   - Nginx (reverse proxy)
#   - Prometheus (metrics)
#   - Grafana (dashboards)
#   - NOESIS API (prediction market)
#   - Sovereign OS UI (React dashboard)
#
# Usage:
#   docker-compose up -d          # Start all services
#   docker-compose down           # Stop all services
#   docker-compose logs -f        # View logs
#   docker-compose ps             # Check status
###############################################################################

version: '3.8'

services:

  # ─── PostgreSQL (Structured Data) ────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: sovereign-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sovereign_os
      POSTGRES_USER: sovereign
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sovereign_secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sovereign"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis (Cache + Pub/Sub + Streams) ───────────────────────

  redis:
    image: redis:7-alpine
    container_name: sovereign-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 1gb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redpanda (Event Streaming) ─────────────────────────────

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    container_name: sovereign-redpanda
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --mode dev-container
      - --smp 1
      - --memory 1G
      - --default-log-level=warn
    ports:
      - "18081:18081"
      - "18082:18082"
      - "19092:19092"
      - "19644:9644"
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy'"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ─── Qdrant (Vector Memory) ──────────────────────────────────

  qdrant:
    image: qdrant/qdrant:latest
    container_name: sovereign-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: "6334"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6333/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─── Nginx (Reverse Proxy) ───────────────────────────────────

  nginx:
    image: nginx:alpine
    container_name: sovereign-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - noesis-api
      - sovereign-ui
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ─── Prometheus (Metrics) ────────────────────────────────────

  prometheus:
    image: prom/prometheus:latest
    container_name: sovereign-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/etc/prometheus/console_libraries
      - --web.console.templates=/etc/prometheus/consoles
      - --storage.tsdb.retention.time=200h
      - --web.enable-lifecycle

  # ─── Grafana (Dashboards) ────────────────────────────────────

  grafana:
    image: grafana/grafana:latest
    container_name: sovereign-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-sovereign}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    depends_on:
      - prometheus

  # ─── NOESIS API (Prediction Market) ──────────────────────────

  noesis-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: sovereign-noesis-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://sovereign:${POSTGRES_PASSWORD:-sovereign_secret}@postgres:5432/sovereign_os
      REDIS_URL: redis://redis:6379
      REDPANDA_BROKERS: redpanda:9092
      QDRANT_URL: http://qdrant:6333
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      LLM_BACKEND: ${LLM_BACKEND:-ollama}
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─── Sovereign OS UI (React Dashboard) ───────────────────────

  sovereign-ui:
    build:
      context: ./sovereign-os-ui
      dockerfile: Dockerfile
    container_name: sovereign-ui
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://noesis-api:8000
    depends_on:
      - noesis-api

  # ─── Kafka Topics Init ───────────────────────────────────────

  kafka-init:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    container_name: sovereign-kafka-init
    depends_on:
      redpanda:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo "Creating Kafka topics..."
        rpk topic create market.created --brokers redpanda:9092 || true
        rpk topic create market.updated --brokers redpanda:9092 || true
        rpk topic create market.resolved --brokers redpanda:9092 || true
        rpk topic create prediction.submitted --brokers redpanda:9092 || true
        rpk topic create prediction.scored --brokers redpanda:9092 || true
        rpk topic create agent.message --brokers redpanda:9092 || true
        rpk topic create agent.insight --brokers redpanda:9092 || true
        rpk topic create agent.evolution --brokers redpanda:9092 || true
        rpk topic create news.ingested --brokers redpanda:9092 || true
        rpk topic create espn.live --brokers redpanda:9092 || true
        rpk topic create svrgn.transaction --brokers redpanda:9092 || true
        rpk topic create system.events --brokers redpanda:9092 || true
        echo "Topics created!"
    restart: "no"

# ─── Volumes ─────────────────────────────────────────────────

volumes:
  postgres_data:
  redis_data:
  redpanda_data:
  qdrant_data:
  prometheus_data:
  grafana_data:

# ─── Networks ─────────────────────────────────────────────────

networks:
  default:
    name: sovereign-network
